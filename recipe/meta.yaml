{% set name = "aws-embedded-metrics" %}
{% set version = "3.5.0" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/{{ name[0] }}/{{ name }}/{{ name | replace('-', '_') }}-{{ version }}.tar.gz
  sha256: 4b5f87d00dd7683fc7651a90f00055b460a1dbce3ffc2fc21698902c9d2e3bea

build:
  noarch: python
  script: {{ PYTHON }} -m pip install . -vv
  number: 0

requirements:
  host:
    - python >=3.6,<3.14
    - pip
    - setuptools
  run:
    - python >=3.6,<3.14
    - aiohttp

test:
  imports:
    - aws_embedded_metrics
  commands:
    - pip check
  requires:
    - pip

about:
  home: https://github.com/awslabs/aws-embedded-metrics-python
  summary: AWS Embedded Metrics Package
  license: Apache-2.0 AND BSD-3-Clause
  license_file:
    - NOTICE
    - LICENSE

extra:
  recipe-maintainers:
    - zuoyuan-alt
    - seoberha
    - zuoyuanh
